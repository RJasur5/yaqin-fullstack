map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Use Docker's internal DNS resolver so nginx re-resolves backend IP dynamically
# This prevents 502 errors after backend container restarts
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name yaqingo.uz findix.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name yaqingo.uz findix.uz;

    ssl_certificate /etc/letsencrypt/live/yaqingo.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yaqingo.uz/privkey.pem;

    # Download APK via direct link
    location = /app.apk {
        root /app/downloads;
        try_files /findix.apk =404;
        default_type application/vnd.android.package-archive;
    }

    # Download directory
    location /download/ {
        alias /app/downloads/;
        default_type application/vnd.android.package-archive;
    }

    location /downloads/ {
        alias /app/downloads/;
        default_type application/vnd.android.package-archive;
    }

    # Backend API — use variable so nginx re-resolves DNS on each request
    location /api {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # WebSocket — also use dynamic DNS resolve
    location /ws {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Static for Web (if any)
    location / {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }
}
