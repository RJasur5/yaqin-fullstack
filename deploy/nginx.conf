map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name yaqingo.uz findix.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name yaqingo.uz findix.uz;

    ssl_certificate /etc/letsencrypt/live/yaqingo.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yaqingo.uz/privkey.pem;

    # Download APK via direct link
    location = /app.apk {
        root /app/downloads;
        try_files /yaqin.apk =404;
        default_type application/vnd.android.package-archive;
    }

    # Download directory
    location /download/ {
        alias /app/downloads/;
        default_type application/vnd.android.package-archive;
    }

    location /downloads/ {
        alias /app/downloads/;
        default_type application/vnd.android.package-archive;
    }

    # Backend API
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }

    # Static for Web (if any)
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
